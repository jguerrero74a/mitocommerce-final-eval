<div
  tabindex="0"
  (click)="onOverlayClick()"
  (keydown.enter)="onOverlayClick()"
  (keydown.escape)="onOverlayClick()"
  [class]="'cr-sidebar-overlay ' + (isOpen() ? 'visible' : 'hidden')"
  aria-label="Cerrar menú"
  toolname="Overlay"
></div>

<div [class]="'cr-mobile-menu ' + (isOpen() ? 'open' : 'closed')">
  <div class="cr-menu-title">
    <span class="menu-title">Mi Menú</span>
    <button type="button" (click)="onClose()" class="cr-close" aria-label="Cerrar menú">×</button>
  </div>
  <div class="cr-menu-inner">
    <div class="cr-menu-content">
      <ul>
        <li class="dropdown drop-list">
          <span class="menu-toggle"></span>
          <a href="javascript:void(0)" class="dropdown-list">Inicio</a>
        </li>

        @for (cat of categories(); track cat.id) {
          <li class="dropdown drop-list">
            <span class="menu-toggle"></span>
            <a href="#" class="dropdown-list"> <i class="ri-leaf-line"></i>{{ cat.name }} </a>
          </li>
        }
      </ul>
    </div>
  </div>
</div>
