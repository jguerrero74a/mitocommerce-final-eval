<section class="cr-checkout-section py-[100px] max-[1200px]:py-[70px]">
  <div
    class="flex flex-wrap justify-between relative items-center mx-auto min-[1600px]:max-w-[1500px] min-[1400px]:max-w-[1320px] min-[1200px]:max-w-[1140px] min-[992px]:max-w-[960px] min-[768px]:max-w-[720px] min-[576px]:max-w-[540px]"
  >
    <div class="flex flex-wrap w-full mb-[-24px]">
      <div
        class="cr-checkout-rightside min-[992px]:w-[33.33%] min-[768px]:w-full w-full px-[12px] mb-[24px]"
      >
        <app-cart-summary [shippingCost]="selectedShippingCost()"></app-cart-summary>

        <div
          class="cr-sidebar-wrap border border-solid border-[#e9e9e9] mb-[30px] p-[15px] bg-white rounded-[5px] mt-[30px]"
        >
          <h3 class="text-[20px] font-semibold mb-[15px]">Método de Envío</h3>
          <div class="cr-checkout-del">
            <p class="text-[#7a7a7a] text-[14px] mb-[15px]">
              Selecciona el método de envío para actualizar tu total.
            </p>

            <form>
              <div class="flex flex-row mb-[15px]">
                <div class="w-[50%]">
                  <span class="block text-[15px] font-medium mb-1">Envío Gratis</span>
                  <input
                    type="radio"
                    id="del1"
                    name="shipping"
                    [checked]="selectedShippingCost() === 0"
                    (change)="onShippingChange(0)"
                  />
                  <label for="del1" class="pl-2 text-[14px] text-[#7a7a7a] cursor-pointer"
                    >S/0.00</label
                  >
                </div>
                <div class="w-[50%]">
                  <span class="block text-[15px] font-medium mb-1">Tarifa Fija</span>
                  <input
                    type="radio"
                    id="del2"
                    name="shipping"
                    [checked]="selectedShippingCost() === 5"
                    (change)="onShippingChange(5)"
                  />
                  <label for="del2" class="pl-2 text-[14px] text-[#7a7a7a] cursor-pointer"
                    >S/5.00</label
                  >
                </div>
              </div>

              <div class="mt-4">
                <span class="block text-[15px] font-medium mb-2">Comentarios del pedido</span>
                <textarea
                  class="w-full border border-[#e9e9e9] p-3 text-[14px] rounded-[5px] h-[100px] outline-none"
                  placeholder="Notas especiales..."
                ></textarea>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div
        class="cr-checkout-leftside min-[992px]:w-[66.66%] min-[768px]:w-full w-full px-[12px] mb-[24px]"
      >
        <div class="p-[24px] border border-solid border-[#e9e9e9] bg-white rounded-[5px]">
          <h3 class="text-[20px] font-semibold mb-[26px]">Detalles de Facturación</h3>

          <form class="flex flex-wrap mx-[-15px]">
            <div class="w-1/2 px-[15px] mb-[20px] max-[576px]:w-full">
              <label class="block text-[15px] font-medium mb-1">Nombre*</label>
              <input
                type="text"
                class="w-full h-[50px] border border-[#e9e9e9] px-[15px] rounded-[5px]"
                required
              />
            </div>
            <div class="w-1/2 px-[15px] mb-[20px] max-[576px]:w-full">
              <label class="block text-[15px] font-medium mb-1">Apellido*</label>
              <input
                type="text"
                class="w-full h-[50px] border border-[#e9e9e9] px-[15px] rounded-[5px]"
                required
              />
            </div>

            <div class="w-full px-[15px] mb-[20px]">
              <label class="block text-[15px] font-medium mb-1">Dirección*</label>
              <input
                type="text"
                placeholder="Calle, número, departamento"
                class="w-full h-[50px] border border-[#e9e9e9] px-[15px] rounded-[5px]"
                required
              />
            </div>

            <div class="w-1/2 px-[15px] mb-[20px] max-[576px]:w-full">
              <label class="block text-[15px] font-medium mb-1">Ciudad*</label>
              <select
                class="w-full h-[50px] border border-[#e9e9e9] px-[15px] rounded-[5px] bg-white"
              >
                <option selected disabled>Seleccionar ciudad</option>
                <option>Lima</option>
                <option>Arequipa</option>
                <option>Trujillo</option>
              </select>
            </div>
            <div class="w-1/2 px-[15px] mb-[20px] max-[576px]:w-full">
              <label class="block text-[15px] font-medium mb-1">Código Postal</label>
              <input
                type="text"
                class="w-full h-[50px] border border-[#e9e9e9] px-[15px] rounded-[5px]"
              />
            </div>

            <div class="w-1/2 px-[15px] mb-[20px] max-[576px]:w-full">
              <label class="block text-[15px] font-medium mb-1">País*</label>
              <select
                class="w-full h-[50px] border border-[#e9e9e9] px-[15px] rounded-[5px] bg-white"
              >
                <option>Perú</option>
              </select>
            </div>
            <div class="w-1/2 px-[15px] mb-[20px] max-[576px]:w-full">
              <label class="block text-[15px] font-medium mb-1">Región / Estado*</label>
              <select
                class="w-full h-[50px] border border-[#e9e9e9] px-[15px] rounded-[5px] bg-white"
              >
                <option selected disabled>Seleccionar región</option>
                <option>Lima Metropolitana</option>
                <option>Callao</option>
              </select>
            </div>
          </form>

          <div class="mt-8 pt-8 border-t border-[#e9e9e9]">
            <h3 class="text-[18px] font-semibold mb-4">Método de Pago</h3>
            <div class="flex flex-col gap-3">
              <label class="flex items-center cursor-pointer text-[14px] text-[#7a7a7a]">
                <input type="radio" name="payment" checked class="mr-2" /> Pago contra entrega
              </label>
              <label class="flex items-center cursor-pointer text-[14px] text-[#7a7a7a]">
                <input type="radio" name="payment" class="mr-2" /> Yape / Plin
              </label>
              <label class="flex items-center cursor-pointer text-[14px] text-[#7a7a7a]">
                <input type="radio" name="payment" class="mr-2" /> Transferencia Bancaria
              </label>
            </div>
          </div>

          <div class="flex justify-end mt-8">
            <button
              (click)="onSubmitOrder()"
              class="bg-[#64b496] text-white px-10 py-3 rounded-[5px] font-bold hover:bg-black transition-all"
            >
              Realizar Pedido
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
