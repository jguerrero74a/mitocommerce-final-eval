<div class="filter-container" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="400">
  <div class="cr-shop-sideview">
    <div class="cr-shop-categories">
      <h4 class="cr-shop-sub-title">Category</h4>
      <div class="cr-checkbox">
        <div class="checkbox-group">
          <input type="checkbox" id="drinks" />
          <label for="drinks">Juice &amp; Drinks</label>
          <span>[20]</span>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="drinks1" />
          <label for="drinks1">Dairy &amp; Milk</label>
          <span>[54]</span>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="drinks2" />
          <label for="drinks2">Snack &amp; Spice</label>
          <span>[64]</span>
        </div>
      </div>
    </div>
    <div class="cr-shop-price">
      <h4 class="cr-shop-sub-title">Precio</h4>
      <div class="price-range-slider">
        <div class="quick-price-buttons">
          <button type="button" class="price-button">Hasta $20k</button>
          <button type="button" class="price-button">$20k - $50k</button>
          <button type="button" class="price-button">Más de $50k</button>
        </div>

        <button type="button" class="cr-button">Aplicar Filtro</button>
      </div>
    </div>
  </div>
</div>
