<div class="w-full px-[12px] mb-[24px]">
  <div class="cr-product-card">
    <div class="cr-product-image">
      <div class="cr-image-inner zoom-image-hover">
        <img [ngSrc]="`https://maraviyainfotech.com/projects/carrot-tailwind/assets/${product().image}`" width="600"
          height="600" alt="product-1" />
      </div>
      <div class="cr-side-view">
        <button (click)="addToWishList()" class="wishlist">
          <i class="ri-heart-line"></i>
        </button>
        <a class="model-oraganic-product cr-modal-toggle">
          <i class="ri-eye-line"></i>
        </a>
      </div>
      <button (click)="addToCart()" class="cr-shopping-bag" href="javascript:void(0)">
        <i class="ri-shopping-bag-line"></i>
      </button>
    </div>
    <div class="cr-product-details">
      <div class="cr-brand">
        <a href="shop-left-sidebar.html">Bakery</a>
        <div class="cr-star">
          @for(ratingDetail of ratingArray(); track $index) {
          <i class="ri-star-fill"></i>
          }
          <p>({{product().rating}})</p>
        </div>
      </div>
      <a href="product-left-sidebar.html" class="title">{{product().name}}</a>
      <p class="cr-price">
        <span class="new-price">{{(product().price ?? 0) + 1.3 }}</span>
        <span class="old-price">{{product().price}}</span>
      </p>
    </div>
  </div>
</div>
