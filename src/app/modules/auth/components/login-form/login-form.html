<form class="cr-content-form" (submit)="onSubmit($event)">
  <div class="form-group">
    <label for="email" class="label-auth">Correo Electrónico*</label>
    <input
      class="input-auth"
      type="email"
      [formField]="loginForm.email"
      placeholder="Ingrese su correo electrónico"
    />
    @if (loginForm.email().touched() && loginForm.email().invalid()) {
      <span class="error-message">{{ loginForm.email().errors()[0].message }}</span>
    }
  </div>
  <div class="form-group">
    <label for="password" class="label-auth">Contraseña*</label>
    <input
      class="input-auth"
      type="password"
      [formField]="loginForm.password"
      placeholder="Ingrese su contraseña"
    />
    @if (loginForm.password().touched() && loginForm.password().invalid()) {
      <span class="error-message">{{ loginForm.password().errors()[0].message }}</span>
    }
  </div>
  <div class="remember">
    <span class="remember-checkbox">
      <input type="checkbox" id="html" class="remember-input" />
      <label for="html" class="remember-label">Recordarme</label>
    </span>
    <a class="forgot-link" href="forgot.html">¿Olvidaste tu contraseña?</a>
  </div>
  <br />
  <div class="login-actions">
    <button type="submit" class="button" [disabled]="isLoading()">
      @if (isLoading()) {
        Cargando...
      } @else {
        Iniciar Sesión
      }
    </button>
    <a href="register.html" class="signup-link">¿No tienes una cuenta?</a>
  </div>
</form>
